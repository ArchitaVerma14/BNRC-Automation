name: BNRC Automation CI

on:
  push:
    branches: [ "main" ]
  pull_request:
  schedule:
    - cron: '35 4 * * *'   # 10:00 AM IST

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: npm install

    - name: Install Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
    - name: Clean screenshots
      run: rm -rf BNRCscreenshots/*

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    # ✅ Run tests and capture results
    - name: Run Playwright tests
      run: |
        npx playwright test test/e-applications/certificate.spec.js --project=chromium --reporter=json > cert-report.json || true
        npx playwright test test/e-applications/transfer.spec.js --project=chromium --reporter=json > transfer-report.json || true
        npx playwright test test/e-applications/foreign.spec.js --project=chromium --reporter=json > foreign-report.json || true
        npx playwright test test/e2e/PRERNA-event.spec.js --project=chromium --reporter=json > prerna-report.json || true
    # ✅ Send email AFTER tests
    - name: Send email notification
      run: node utils/sendEmail.js
      env:
        EMAIL_USER: ${{ secrets.EMAIL_USER }}
        EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        EMAIL_TO: ${{ secrets.EMAIL_TO }}