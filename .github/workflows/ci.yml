name: BNRC Automation CI

on:
  push:
    branches: [ "main" ]
  pull_request:
  schedule:
    - cron: '30 4 * * *'   # 10:00 AM IST

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: npm install

    - name: Install Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    # ✅ Run tests and capture results
    - name: Run Certificate Test
      run: npx mocha test/e-applications/certificate.js > cert.txt || true

    - name: Run Transfer Test
      run: npx mocha test/e-applications/transfer.js > transfer.txt || true

    - name: Run Foreign Test
      run: npx mocha test/e-applications/foreign.js > foreign.txt || true

    # ✅ Send email AFTER tests
    - name: Send email notification
      run: node utils/sendEmail.js
      env:
        EMAIL_USER: ${{ secrets.EMAIL_USER }}
        EMAIL_PASS: ${{ secrets.EMAIL_PASS }}